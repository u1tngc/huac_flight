<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUACフライト管理ツール ユーザー情報訂正（照会）</title>
    <link rel="stylesheet" href="../static/FL1C0041.css">
</head>

<body>
    <header>
        <h1>HUACフライト管理ツール</h1>
    </header>

    <main>
        <section class="options">
            <h2>ユーザー情報訂正（照会）</h2>
            {% if err1 %}
            <a class="err">{{ err1 }}</a>
            <br><br>
            {% endif %}
            <a>訂正するユーザーを選択してください。</a>
            <br>
            <br>
            <form method="post" action="/FL_db002">
                <div class="data-section">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>選択</th>
                                <th>ユーザーID</th>
                                <th>氏名</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for user in userData %}

                            <tr>
                                <td>
                                    <input type="radio" name="selected_userInfo" value="{{ user[0] }}"
                                        id="user_{{ loop.index }}" {% if loop.first %}checked{% endif %}>
                                </td>
                                <td>
                                    <label for="user_{{ loop.index }}">{{ user[0] }}</label>
                                </td>
                                <td>
                                    <label for="user_{{ loop.index }}">{{ user[1] }}</label>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                <div class="button-group">
                    <button type="button" onclick="location.href='/FL_menu01'" class="menu-button">Menu</button>
                    <button type="submit" class="execute-button">次へ</button>
                </div>

            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Yuichi Taniguchi</p>
    </footer>
</body>

</html>
