<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUACフライト管理ツール 索切処置履歴照会</title>
    <link rel="stylesheet" href="../static/FL1C0040.css">
</head>

<body>
    <header>
        <h1>HUACフライト管理ツール</h1>
    </header>

    <main>
        <section class="options">
            <h2>索切処置履歴照会</h2>
            <div class="student-info">
                <p><strong>氏名:</strong> {{ rireki[0][0] }}</p>
            </div>
            <form method="post" action="/FL_db032">
                <div class="history-list">
                    {% for list in rireki %}
                    <div class="history-card">
                        <div class="history-card-header">
                            <span class="history-date">{{ list[1] }}</span>
                            <span class="history-subject">{{ list[2] }}</span>
                            <span class="history-instructor"><span class="field-label">教官</span>{{ list[3] }}</span>
                        </div>
                        <p class="history-comment"><span class="field-label">コメント</span>{{ list[4] }}</p>
                    </div>
                    {% else %}
                    <p class="history-empty">該当する履歴データがありません。</p>
                    {% endfor %}
                </div>

                <div class="button-group">
                    <button type="button" onclick="location.href='/FL_db021'" class="menu-button">戻る</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Yuichi Taniguchi</p>
    </footer>
</body>

</html>
